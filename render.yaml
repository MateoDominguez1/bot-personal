services:
  - type: web
    name: bot-personal
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn bot:app
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: NOTION_TOKEN
        sync: false
      - key: APPLE_ID
        sync: false
      - key: APPLE_APP_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.3"
